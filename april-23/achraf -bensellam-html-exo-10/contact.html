<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- ! header contact -->
    <header>
        <h1> contact us</h1>
        <a href="digital.html">home</a> <a href="about.html">about</a> <a href="courses.html">courses</a>

    </header>
    <!-- ! main contact -->
    <main>
        <!-- * form -->
        <form action="">
            <h2>registration form</h2>
            <!-- ? fieldset 1 -->
            <fieldset>
                <legend> personal info</legend>
                <label for="name">name :</label>
                <input type="text">
                <br><br>
                 <label for="email">email :</label>
                <input type="email">
                <br><br>
                 <label for="password">password :</label>
                <input type="password">
                <br><br>
                 <label for="age">age :</label>
                <input type="number">
                <br><br>
                 <label for="birth">date of birth :</label>
                <input type="date">
            </fieldset>
            <!-- ? fieldset 2 -->
            <fieldset>
                <legend>gender</legend>
                <input type="radio" name="gender">
                <label for="male">male</label>
                <input type="radio" name="gender">
                <label for="female">female</label>
                <input type="radio" name="gender">
                <label for="other">other</label>
            </fieldset>
            <!-- ? fieldset 3 -->
            <fieldset>
                <legend>skills</legend>
                <input type="checkbox" name="" id="">
                <label for="html">html</label>
                <input type="checkbox" name="" id="">
                <label for="css">css</label>
                <input type="checkbox" name="" id="">
                <label for="js">js</label>
            </fieldset>
            <!-- ? fieldset 4 -->
            <fieldset>
                <legend>contry</legend>
                <select name="country" id="">
                    <option value="mo">morocco</option>
                    <option value="al">algeria</option>
                </select>
            </fieldset>
            <!-- ? fieldset 5 -->
            <fieldset>
                <legend>message</legend>
                <textarea name="msg" cols="50" rows="3" id=""></textarea>
            </fieldset>
            <!-- ? fieldset1 6 -->
            <fieldset>
                <legend>upload</legend>
                <input type="file" name="" id="">
            </fieldset>
            <input type="submit">
            <button type="reset"> reset</button>
        </form>
    </main>
    <!-- ! footer -->
    <footer>
        <a href="digital.html">home</a>
    </footer>
</body>
</html>
